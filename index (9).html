<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Compras</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --paper-color: #ffffff;
            --text-color: #333;
            --accent-color: #2c3e50;
            --border-color: #d1ccc0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--paper-color);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            border-radius: 2px;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px double var(--accent-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: #fafafa;
            font-family: inherit;
        }

        button#add-btn {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 1.1rem;
        }

        li:last-child {
            border-bottom: none;
        }

        .item-text {
            flex-grow: 1;
            cursor: pointer;
        }

        .completed .item-text {
            text-decoration: line-through;
            color: #888;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 10px;
        }

        .checkbox {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lista de Compras</h2>
    
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Ex: Arroz, Leite..." autocomplete="off">
        <button id="add-btn">ADICIONAR</button>
    </div>

    <ul id="shoppingList">
        </ul>
</div>

<script>
    const input = document.getElementById('itemInput');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('shoppingList');

    // Função para adicionar item
    function addItem() {
        const text = input.value.trim();
        if (text === "") return;

        const li = document.createElement('li');
        li.innerHTML = `
            <input type="checkbox" class="checkbox">
            <span class="item-text">${text}</span>
            <button class="delete-btn">×</button>
        `;

        // Marcar como concluído
        const checkbox = li.querySelector('.checkbox');
        checkbox.addEventListener('change', () => {
            li.classList.toggle('completed');
        });

        // Remover item
        const deleteBtn = li.querySelector('.delete-btn');
        deleteBtn.addEventListener('click', () => {
            li.remove();
        });

        list.appendChild(li);
        input.value = "";
        input.focus();
    }

    addBtn.addEventListener('click', addItem);

    // Adicionar com a tecla Enter
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            addItem();
        }
    });
</script>

</body>
</html>
